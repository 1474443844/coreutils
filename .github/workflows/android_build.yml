name: Rust Android Build

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: '请输入要构建的 Tag 名称 (如 v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 检出指定 Tag 的代码
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag_name }}
          fetch-depth: 0 # 获取完整历史以确保能找到对应的 Tag

      # 2. 设置 Rust 交叉编译环境和目标平台 (Targets)
      - name: Set up Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: |
            aarch64-linux-android
            x86_64-linux-android

      # 3. 启用 Rust 依赖缓存，加快后续构建速度
      - name: Cache Cargo Dependencies
        uses: Swatinem/rust-cache@v2

      # 4. 配置 Android NDK 环境变量
      # GitHub 的 ubuntu-latest 镜像已预装 NDK，我们将其路径传递给 ANDROID_NDK_HOME
      - name: Configure Android NDK
        run: |
          echo "ANDROID_NDK_HOME=${ANDROID_NDK_LATEST_HOME}" >> $GITHUB_ENV

      # 5. 快速安装 cargo-ndk 工具
      # 使用 cargo-binstall 直接下载预编译的二进制，能比从源码编译（cargo install）节省数分钟
      - name: Install cargo-ndk
        run: |
          curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          cargo binstall --no-confirm cargo-ndk

      # 6. 开始编译 Android 独立可执行二进制文件
      - name: Build Rust Executable for Android
        run: |
          # 编译 64位 ARM (aarch64) 可执行文件（适用于现代手机）
          cargo ndk -t aarch64-linux-android build --release
          
          # 编译 64位 x86_64 可执行文件（适用于模拟器）
          cargo ndk -t x86_64-linux-android build --release

      # 7. 整理并提取编译好的二进制文件
      - name: Organize Binaries
        run: |
          mkdir -p ./android-binaries/arm64-v8a
          mkdir -p ./android-binaries/x86_64
          
          # 【注意】请将下面的 "coreutils" 替换为你实际编译出来的二进制文件名（通常无后缀）
          # 如果你编译出来的是 uutils，就用 uutils 代替
          cp target/aarch64-linux-android/release/coreutils ./android-binaries/arm64-v8a/
          cp target/x86_64-linux-android/release/coreutils ./android-binaries/x86_64/

      # 8. 上传归档
      - name: Upload Android Executables
        uses: actions/upload-artifact@v4
        with:
          name: rust-android-binaries-${{ github.event.inputs.tag_name }}
          path: ./android-binaries/
